<script>

// ===============================
// GAS Chat Script Part 1
// ===============================

let userId = "";
let nickname = "";

const messageInput = document.getElementById("messageInput");
const sendButton = document.getElementById("sendButton");
const nicknameModal = document.getElementById("nicknameModal");
const nicknameInput = document.getElementById("nicknameInput");
const saveNicknameButton = document.getElementById("saveNicknameButton");
const changeNicknameButton = document.getElementById("changeNicknameButton");
const charCount = document.getElementById("charCount");

// ------------------------------
// ランダムID生成
// ------------------------------

function generateId(length = 6) {

    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    let id = "";

    for (let i = 0; i < length; i++) {

        id += chars[Math.floor(Math.random() * chars.length)];

    }

    return id;

}

// ------------------------------
// 初期設定
// ------------------------------

function initialize() {

    userId = localStorage.getItem("userId");

    if (!userId) {

        userId = generateId();

        localStorage.setItem("userId", userId);

    }

    nickname = localStorage.getItem("nickname");

    if (!nickname) {

        nicknameModal.style.display = "flex";

    } else {

        nicknameModal.style.display = "none";

    }

    updateCounter();

}

initialize();

// ------------------------------
// ニックネーム保存
// ------------------------------

function saveNickname() {

    const name = nicknameInput.value.trim();

    if (name.length === 0) {

        alert("ニックネームを入力してください");

        return;

    }

    if (name.length > 20) {

        alert("20文字以内です");

        return;

    }

    nickname = name;

    localStorage.setItem("nickname", nickname);

    google.script.run.setNickname(userId, nickname);

    nicknameModal.style.display = "none";

}

saveNicknameButton.onclick = saveNickname;

// ------------------------------
// 名前変更
// ------------------------------

changeNicknameButton.onclick = () => {

    nicknameInput.value = nickname;

    nicknameModal.style.display = "flex";

};

// ------------------------------
// 100文字カウンター
// ------------------------------

function updateCounter() {

    charCount.textContent = messageInput.value.length;

}

messageInput.addEventListener("input", updateCounter);

// ------------------------------
// Enter送信
// ------------------------------

messageInput.addEventListener("keydown", e => {

    if (e.key === "Enter" && !e.shiftKey) {

        e.preventDefault();

        sendMessage();

    }

});

</script>
<script>

// ===================================
// Part2
// メッセージ送信・取得
// ===================================

let isSending = false;

// ---------------------
// 送信
// ---------------------

function sendMessage(){

    if(isSending) return;

    const text = messageInput.value.trim();

    if(text==="") return;

    if(text.length>100){

        alert("100文字までです");

        return;

    }

    isSending=true;

    sendButton.disabled=true;

    sendButton.textContent="送信中...";

    google.script.run

    .withSuccessHandler(function(){

        messageInput.value="";

        updateCounter();

        sendButton.disabled=false;

        sendButton.textContent="送信";

        isSending=false;

        loadMessages(true);

    })

    .withFailureHandler(function(err){

        alert(err.message);

        sendButton.disabled=false;

        sendButton.textContent="送信";

        isSending=false;

    })

    .sendMessage(userId,nickname,text);

}

// ---------------------
// メッセージ取得
// ---------------------

function loadMessages(scrollBottom=false){

    google.script.run

    .withSuccessHandler(function(messages){

        drawMessages(messages);

        if(scrollBottom){

            const chat=document.getElementById("chatArea");

            chat.scrollTop=chat.scrollHeight;

        }

    })

    .getMessages();

}

// ---------------------
// メッセージ表示
// ---------------------

function drawMessages(messages){

    const area=document.getElementById("messages");

    area.innerHTML="";

    messages.forEach(msg=>{

        const box=document.createElement("div");

        box.className="message";

        if(msg.userId===userId){

            box.classList.add("me");

        }else{

            box.classList.add("other");

        }

        box.innerHTML=`

<div class="nickname">${escapeHtml(msg.nickname)}</div>

<div class="bubble">

${escapeHtml(msg.message)}

</div>

<div class="time">

${formatTime(msg.time)}

</div>

`;

        area.appendChild(box);

    });

}

// ---------------------
// HTMLエスケープ
// ---------------------

function escapeHtml(text){

    return String(text)

    .replace(/&/g,"&amp;")

    .replace(/</g,"&lt;")

    .replace(/>/g,"&gt;")

    .replace(/"/g,"&quot;")

    .replace(/'/g,"&#039;");

}

// ---------------------
// 時刻表示
// ---------------------

function formatTime(date){

    const d=new Date(date);

    return d.toLocaleTimeString("ja-JP",{

        hour:"2-digit",

        minute:"2-digit"

    });

}

// ---------------------
// 1秒更新
// ---------------------

setInterval(function(){

    loadMessages();

},1000);

// ---------------------
// 最初の読み込み
// ---------------------

loadMessages(true);

</script>
