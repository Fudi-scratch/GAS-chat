<script>

// ===============================
// GAS Chat Script Part1
// 初期化・ニックネーム
// ===============================

let userId = "";
let nickname = "";

let isSending = false;

// ------------------------------
// 要素取得
// ------------------------------

const messageInput = document.getElementById("messageInput");
const sendButton = document.getElementById("sendButton");

const nicknameModal = document.getElementById("nicknameModal");
const nicknameInput = document.getElementById("nicknameInput");

const saveNicknameButton = document.getElementById("savenicknameButton");
const changeNicknameButton = document.getElementById("changenicknameButton");

const charCount = document.getElementById("charCount");

// ------------------------------
// ランダムID生成
// ------------------------------

function generateId(length = 6){

    const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    let id = "";

    for(let i=0;i<length;i++){

        id += chars[
            Math.floor(
                Math.random()*chars.length
            )
        ];

    }

    return id;

}

// ------------------------------
// 初期化
// ------------------------------

function initialize(){

    userId = localStorage.getItem("userId");

    if(!userId){

        userId = generateId();

        localStorage.setItem(
            "userId",
            userId
        );

    }

    nickname =
    localStorage.getItem("nickname") || "";

    if(nickname===""){

        nicknameModal.style.display="flex";

    }else{

        nicknameModal.style.display="none";

        nicknameInput.value = nickname;

    }

    updateCounter();

}

initialize();

// ------------------------------
// ニックネーム保存
// ------------------------------

function saveNickname(){

    const name =
    nicknameInput.value.trim();

    if(name===""){

        alert("ニックネームを入力してください");

        return;

    }

    if(name.length>20){

        alert("20文字以内です");

        return;

    }

    saveNicknameButton.disabled = true;
    saveNicknameButton.textContent = "保存中...";

    google.script.run

    .withSuccessHandler(function(){

        nickname = name;

        localStorage.setItem(
            "nickname",
            nickname
        );

        nicknameModal.style.display="none";

        saveNicknameButton.disabled = false;
        saveNicknameButton.textContent = "はじめる";

        loadMessages(true);

    })

    .withFailureHandler(function(err){

        alert(err.message);

        saveNicknameButton.disabled = false;
        saveNicknameButton.textContent = "はじめる";

    })

    .saveUser(
        userId,
        name
    );

}

// ------------------------------
// ボタン
// ------------------------------

saveNicknameButton.onclick =
saveNickname;

changeNicknameButton.onclick =
function(){

    nicknameInput.value = nickname;

    nicknameModal.style.display =
    "flex";

};

// ------------------------------
// 文字数
// ------------------------------

function updateCounter(){

    charCount.textContent =
    messageInput.value.length;

}

messageInput.addEventListener(
    "input",
    updateCounter
);

// ------------------------------
// Enter送信
// ------------------------------

messageInput.addEventListener(
    "keydown",
    function(e){

        if(
            e.key==="Enter" &&
            !e.shiftKey
        ){

            e.preventDefault();

            sendMessage();

        }

    }
);

// ------------------------------
// 送信ボタン
// ------------------------------

sendButton.onclick = sendMessage;

</script>
<script>

// ===================================
// Part2-1
// メッセージ送信・取得・表示
// ===================================

// ---------------------
// 送信
// ---------------------

function sendMessage(){

    if(isSending) return;

    const text = messageInput.value.trim();

    if(text==="") return;

    if(text.length>100){

        alert("100文字までです");

        return;

    }

    if(nickname===""){

        alert("ニックネームを設定してください");

        nicknameModal.style.display="flex";

        return;

    }

    isSending = true;

    sendButton.disabled = true;

    sendButton.textContent = "送信中...";

    google.script.run

    .withSuccessHandler(function(){

        messageInput.value = "";

        updateCounter();

        sendButton.disabled = false;

        sendButton.textContent = "送信";

        isSending = false;

        loadMessages(true);

    })

    .withFailureHandler(function(err){

        alert(err.message);

        sendButton.disabled = false;

        sendButton.textContent = "送信";

        isSending = false;

    })

    .sendMessage(
        userId,
        text
    );

}

// ---------------------
// 取得
// ---------------------

function loadMessages(scrollBottom=false){

    google.script.run

    .withSuccessHandler(function(messages){

        drawMessages(messages);

        if(scrollBottom){

            const chat =
            document.getElementById("chatArea");

            chat.scrollTop =
            chat.scrollHeight;

        }

    })

    .withFailureHandler(function(err){

        console.log(err);

    })

    .getMessages();

}

// ---------------------
// 表示
// ---------------------

function drawMessages(messages){

    const area =
    document.getElementById("messages");

    const chat =
    document.getElementById("chatArea");

    const oldTop =
    chat.scrollTop;

    const oldHeight =
    chat.scrollHeight;

    area.innerHTML="";

    messages.forEach(function(msg){

        // 自動既読

        if(msg.userId!==userId){

            google.script.run.markAsRead(

                msg.messageId,

                userId

            );

        }

        const box =
        document.createElement("div");

        box.className="message";

        if(msg.userId===userId){

            box.classList.add("me");

        }else{

            box.classList.add("other");

        }

        let menu="";

        if(msg.userId===userId){

            menu=`

<div class="messageMenu">

<button onclick="editMessage('${msg.messageId}')">

✏️

</button>

<button onclick="deleteMessage('${msg.messageId}')">

🗑️

</button>

</div>

`;

        }

        // ----------

        // 既読

        // ----------

        let readHTML="";

        if(msg.readUsers){

            const list =
            String(msg.readUsers).split(",");

            const names=[];

            list.forEach(function(v){

                const data=v.split(":");

                if(data.length>=2){

                    names.push(data[1]);

                }

            });

            if(names.length){

                readHTML=`

<div class="read">

👀 ${escapeHtml(names.join("、"))}

</div>

`;

            }

        }

        box.innerHTML=`

<div class="nickname">

${escapeHtml(msg.nickname)}

</div>

${menu}

<div class="bubble">

${escapeHtml(msg.message)}

</div>

<div class="time">

${formatTime(msg.time)}

</div>

${readHTML}

`;

        area.appendChild(box);

    });

    // スクロール維持

    if(

        oldTop + chat.clientHeight

        >= oldHeight - 20

    ){

        chat.scrollTop = chat.scrollHeight;

    }else{

        chat.scrollTop = oldTop;

    }

}
    // ---------------------
// HTMLエスケープ
// ---------------------

function escapeHtml(text){

    return String(text)

    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");

}

// ---------------------
// 時刻表示
// ---------------------

function formatTime(date){

    const d = new Date(date);

    return d.toLocaleTimeString("ja-JP",{

        hour:"2-digit",
        minute:"2-digit"

    });

}

// =======================
// 編集
// =======================

function editMessage(messageId){

    const text = prompt("新しいメッセージを入力してください");

    if(text===null) return;

    const newText = text.trim();

    if(newText===""){

        alert("メッセージを入力してください");

        return;

    }

    if(newText.length>100){

        alert("100文字までです");

        return;

    }

    google.script.run

    .withSuccessHandler(function(){

        loadMessages();

    })

    .withFailureHandler(function(err){

        alert(err.message);

    })

    .editMessage(

        messageId,

        userId,

        newText

    );

}

// =======================
// 削除
// =======================

function deleteMessage(messageId){

    if(!confirm("このメッセージを削除しますか？")){

        return;

    }

    google.script.run

    .withSuccessHandler(function(){

        loadMessages();

    })

    .withFailureHandler(function(err){

        alert(err.message);

    })

    .deleteMessage(

        messageId,

        userId

    );

}

// ---------------------
// 自動更新
// ---------------------

setInterval(function(){

    loadMessages();

},1000);

// ---------------------
// 初回読み込み
// ---------------------

window.addEventListener("load",function(){

    loadMessages(true);

});

</script>
