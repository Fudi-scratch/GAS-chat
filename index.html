  <!-- 初回ニックネーム設定 -->
  <div id="nicknameModal" class="modal">
    <div class="modalBox">
      <h2>ニックネーム</h2>

      <p>最初にニックネームを決めてください。</p>

      <input
        id="nicknameInput"
        type="text"
        maxlength="20"
        placeholder="ニックネーム">

      <button id="savenicknameButton">
        はじめる
      </button>
    </div>
  </div>

  <!-- 全体 -->
  <div id="app">

    <!-- ヘッダー -->
    <header>

      <div class="title">
        💬 GAS Chat
      </div>

      <button id="changenicknameButton">

      <div id="messages">

    <!-- 入力欄 -->
    <footer>

      <div class="counter">

        <span id="charCount">

        </span>

      </div>

      <div class="inputArea">

        <textarea
          id="messageInput"
          maxlength="100"
          placeholder="メッセージを入力..."
          rows="2"></textarea>

        <button id="sendButton">
          送信
        </button>

      </div>

    </footer>

  </div>
